<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mensagem - Holyrics</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
        }

        /* --- PAINEL GLOBAL DE CONFIGURAÇÕES --- */
        .painel-config {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .config-grupo {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 200px;
        }

        .config-grupo label {
            font-size: 13px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .config-grupo input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .margens-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        /* --- GRADE DE SLIDES --- */
        .slides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .slide-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2c3e50;
        }

        /* --- BARRA DE FORMATAÇÃO --- */
        .format-toolbar {
            display: flex;
            gap: 5px;
            background: #ecf0f1;
            padding: 4px;
            border-radius: 4px;
        }

        .btn-format {
            background: white;
            border: 1px solid #bdc3c7;
            border-radius: 3px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            transition: all 0.2s;
        }

        .btn-format:hover {
            background: #e0e0e0;
            border-color: #95a5a6;
        }

        /* --- A TELA VIRTUAL --- */
        .preview-wrapper {
            width: 100%;
            aspect-ratio: 32 / 9;
            background-color: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .virtual-screen {
            width: 1280px; 
            height: 360px; 
            transform-origin: top left;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
        }

        .margin-container {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 5% 10%;
        }

        .text-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-text {
            width: 100%;
            text-align: center;
            /* Permite ler as tags HTML renderizadas */
            white-space: normal; 
            word-wrap: break-word;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9), -1px -1px 3px rgba(0,0,0,0.8); 
            line-height: 1.2;
        }

        /* --- ELEMENTOS DE TEXTO E AVISOS --- */
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            resize: vertical;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .warning-msg {
            color: #e74c3c;
            font-size: 12px;
            font-weight: bold;
            display: none;
            background: #fadbd8;
            padding: 5px;
            border-radius: 4px;
            text-align: center;
        }

        /* --- BOTÕES --- */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        
        .btn-remove {
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-add-card {
            border: 2px dashed #bdc3c7;
            background: transparent;
            color: #7f8c8d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            min-height: 200px;
            transition: all 0.2s;
        }

        .btn-add-card:hover {
            background: #ecf0f1;
            border-color: #95a5a6;
            color: #2c3e50;
        }

        .btn-export {
            background-color: #2980b9;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gerador de Slides Holyrics (32:9)</h1>
        <p>A fonte ajustará automaticamente. Selecione um texto para usar as opções de formatação.</p>
    </div>

    <div class="painel-config">
        <div class="config-grupo">
            <label>Fundo de Tela (Imagem)</label>
            <input type="file" id="input-fundo" accept="image/*" onchange="mudarFundoGlobal(event)">
        </div>

        <div class="config-grupo" style="flex: 0.5;">
            <label>Cor da Fonte</label>
            <input type="color" id="input-cor" value="#ffffff" oninput="aplicarConfiguracoesGlobais()" style="width: 100%; height: 35px; padding: 0;">
        </div>

        <div class="config-grupo" style="flex: 0.5;">
            <label title="Tamanho máximo quando houver pouco texto">Fonte Máx (px)</label>
            <input type="number" id="input-max" value="70" oninput="aplicarConfiguracoesGlobais()">
        </div>

        <div class="config-grupo" style="flex: 0.5;">
            <label title="Tamanho mínimo antes de gerar alerta">Fonte Mín (px)</label>
            <input type="number" id="input-min" value="35" oninput="aplicarConfiguracoesGlobais()">
        </div>

        <div class="config-grupo" style="flex: 1.5;">
            <label>Margens (%) - Topo, Baixo, Esq, Dir</label>
            <div class="margens-grid">
                <input type="number" id="input-mt" value="5" title="Topo" oninput="aplicarConfiguracoesGlobais()">
                <input type="number" id="input-mb" value="5" title="Baixo" oninput="aplicarConfiguracoesGlobais()">
                <input type="number" id="input-me" value="10" title="Esquerda" oninput="aplicarConfiguracoesGlobais()">
                <input type="number" id="input-md" value="10" title="Direita" oninput="aplicarConfiguracoesGlobais()">
            </div>
        </div>
    </div>

    <div class="slides-grid" id="lista-slides">
        <div class="slide-container">
            <div class="slide-header">
                <span class="slide-numero">Slide 1</span>
                
                <div class="format-toolbar">
                    <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'b')" title="Negrito"><b>B</b></button>
                    <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'i')" title="Itálico"><i>I</i></button>
                    <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'u')" title="Sublinhado"><u>U</u></button>
                </div>

                <button class="btn btn-remove" onclick="removerSlide(this)">Remover</button>
            </div>
            
            <div class="preview-wrapper">
                <div class="virtual-screen">
                    <div class="margin-container">
                        <div class="text-wrapper">
                            <div class="preview-text">A prévia do texto aparecerá aqui...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="warning-msg">⚠️ Muito texto! A fonte atingiu o limite mínimo.</div>
            
            <textarea placeholder="Digite o texto deste slide aqui..." oninput="atualizarTextoEAutoFit(this.closest('.slide-container'))"></textarea>
        </div>

        <button class="btn-add-card" id="btn-add" onclick="adicionarSlide()">+ Novo Slide</button>
    </div>

    <button class="btn btn-export" onclick="exportarParaHolyrics()">📥 Baixar Arquivo para Holyrics</button>

    <script>
        let backgroundUrlGlobal = '';

        window.onload = function() {
            aplicarConfiguracoesGlobais();
            window.addEventListener('resize', ajustarEscalaDeTodasAsTelas);
        }

        // --- LÓGICA DE ESCALA DA TELA VIRTUAL ---
        function ajustarEscalaDeTodasAsTelas() {
            document.querySelectorAll('.slide-container').forEach(slide => {
                const wrapper = slide.querySelector('.preview-wrapper');
                const virtual = slide.querySelector('.virtual-screen');
                const scale = wrapper.clientWidth / 1280;
                virtual.style.transform = `scale(${scale})`;
            });
        }

        // --- ADICIONAR E REMOVER SLIDES ---
        function adicionarSlide() {
            const grid = document.getElementById('lista-slides');
            const botaoAdd = document.getElementById('btn-add');
            const slideCount = document.querySelectorAll('.slide-container').length + 1;
            
            const novoSlide = document.createElement('div');
            novoSlide.className = 'slide-container';
            
            novoSlide.innerHTML = `
                <div class="slide-header">
                    <span class="slide-numero">Slide ${slideCount}</span>
                    
                    <div class="format-toolbar">
                        <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'b')" title="Negrito"><b>B</b></button>
                        <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'i')" title="Itálico"><i>I</i></button>
                        <button type="button" class="btn-format" onclick="aplicarFormatacao(this, 'u')" title="Sublinhado"><u>U</u></button>
                    </div>

                    <button class="btn btn-remove" onclick="removerSlide(this)">Remover</button>
                </div>
                
                <div class="preview-wrapper">
                    <div class="virtual-screen" style="background-image: ${backgroundUrlGlobal ? `url(${backgroundUrlGlobal})` : 'none'}">
                        <div class="margin-container">
                            <div class="text-wrapper">
                                <div class="preview-text"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="warning-msg">⚠️ Muito texto! A fonte atingiu o limite mínimo.</div>
                
                <textarea placeholder="Digite o texto deste slide aqui..." oninput="atualizarTextoEAutoFit(this.closest('.slide-container'))"></textarea>
            `;
            
            grid.insertBefore(novoSlide, botaoAdd);
            atualizarNumeracao();
            aplicarConfiguracoesEmSlide(novoSlide); 
            ajustarEscalaDeTodasAsTelas(); 
            
            novoSlide.querySelector('textarea').focus();
        }

        function removerSlide(botao) {
            botao.closest('.slide-container').remove();
            atualizarNumeracao();
        }

        function atualizarNumeracao() {
            const slides = document.querySelectorAll('.slide-container');
            slides.forEach((slide, index) => {
                slide.querySelector('.slide-numero').textContent = `Slide ${index + 1}`;
            });
        }

        // --- FORMATAÇÃO DE TEXTO (NEGRITO, ITÁLICO, SUBLINHADO) ---
        function aplicarFormatacao(botao, tagHTML) {
            const slide = botao.closest('.slide-container');
            const textarea = slide.querySelector('textarea');
            
            const inicio = textarea.selectionStart;
            const fim = textarea.selectionEnd;
            const textoCompleto = textarea.value;
            
            const textoAntes = textoCompleto.substring(0, inicio);
            const textoSelecionado = textoCompleto.substring(inicio, fim);
            const textoDepois = textoCompleto.substring(fim, textoCompleto.length);
            
            // Insere as tags ao redor do texto (ou onde o cursor está)
            const textoFormatado = `<${tagHTML}>${textoSelecionado}</${tagHTML}>`;
            
            textarea.value = textoAntes + textoFormatado + textoDepois;
            
            // Foca de volta no campo de texto
            textarea.focus();
            
            // Reposiciona o cursor adequadamente
            if (textoSelecionado.length === 0) {
                // Se não tinha texto selecionado, coloca o cursor no meio das tags
                textarea.selectionStart = textarea.selectionEnd = inicio + tagHTML.length + 2;
            } else {
                // Se tinha texto, deixa o bloco todo selecionado junto com as tags
                textarea.selectionStart = inicio;
                textarea.selectionEnd = inicio + textoFormatado.length;
            }
            
            // Atualiza a tela de preview
            atualizarTextoEAutoFit(slide);
        }

        // --- CONFIGURAÇÕES GLOBAIS ---
        function mudarFundoGlobal(event) {
            const file = event.target.files[0];
            if (file) {
                backgroundUrlGlobal = URL.createObjectURL(file);
                document.querySelectorAll('.virtual-screen').forEach(tela => {
                    tela.style.backgroundImage = `url(${backgroundUrlGlobal})`;
                });
            }
        }

        function aplicarConfiguracoesGlobais() {
            document.querySelectorAll('.slide-container').forEach(slide => {
                aplicarConfiguracoesEmSlide(slide);
                atualizarTextoEAutoFit(slide); 
            });
        }

        function aplicarConfiguracoesEmSlide(slide) {
            const mt = document.getElementById('input-mt').value || 5;
            const mb = document.getElementById('input-mb').value || 5;
            const me = document.getElementById('input-me').value || 10;
            const md = document.getElementById('input-md').value || 10;
            const cor = document.getElementById('input-cor').value;

            const marginContainer = slide.querySelector('.margin-container');
            const previewText = slide.querySelector('.preview-text');
            
            marginContainer.style.padding = `${mt}% ${md}% ${mb}% ${me}%`;
            previewText.style.color = cor;
            
            ajustarEscalaDeTodasAsTelas();
        }

        // --- AUTO-FIT E RENDERIZAÇÃO DO PREVIEW ---
        function atualizarTextoEAutoFit(slide) {
            const textarea = slide.querySelector('textarea');
            const previewText = slide.querySelector('.preview-text');
            const textWrapper = slide.querySelector('.text-wrapper');
            const warning = slide.querySelector('.warning-msg');
            
            // Renderiza o texto permitindo as tags HTML, e converte quebras de linha normais em <br> para o HTML entender
            let conteudoParaPreview = textarea.value;
            conteudoParaPreview = conteudoParaPreview.replace(/\n/g, '<br>');
            previewText.innerHTML = conteudoParaPreview;

            if(textarea.value.trim() === '') {
                warning.style.display = 'none';
                textarea.style.borderColor = '#bdc3c7';
                return;
            }

            const maxFont = parseInt(document.getElementById('input-max').value) || 70;
            const minFont = parseInt(document.getElementById('input-min').value) || 35;
            
            let currentFont = maxFont;
            previewText.style.fontSize = currentFont + 'px';
            
            while (currentFont > minFont && previewText.scrollHeight > textWrapper.clientHeight) {
                currentFont--;
                previewText.style.fontSize = currentFont + 'px';
            }
            
            if (currentFont === minFont && previewText.scrollHeight > textWrapper.clientHeight) {
                warning.style.display = 'block';
                textarea.style.borderColor = '#e74c3c'; 
            } else {
                warning.style.display = 'none';
                textarea.style.borderColor = '#bdc3c7'; 
            }
        }

        // --- EXPORTAÇÃO ---
        function exportarParaHolyrics() {
            const caixasTexto = document.querySelectorAll('textarea');
            let textos = [];

            caixasTexto.forEach(caixa => {
                const conteudo = caixa.value.trim();
                if (conteudo !== '') {
                    textos.push(conteudo);
                }
            });

            if (textos.length === 0) {
                alert("Nenhum texto encontrado para exportar.");
                return;
            }

            // O Holyrics entende as quebras duplas como divisores de slide e preservará as tags HTML escritas
            const textoFinal = textos.join('\n\n');
            const blob = new Blob([textoFinal], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Mensagem_Culto_Holyrics.txt';
            document.body.appendChild(link);
            link.click();
            
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
