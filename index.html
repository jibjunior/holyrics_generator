<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mensagem - Holyrics</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
        }

        /* Layout dividido em duas colunas no PC */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* --- LADO ESQUERDO: EDITOR --- */
        .slide-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border-left: 4px solid transparent;
            transition: border-color 0.2s;
        }

        .slide-container.ativo {
            border-left: 4px solid #3498db; /* Destaque para o slide sendo editado */
        }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* --- LADO DIREITO: PREVIEW E CONFIGURAÇÕES --- */
        .painel-preview {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
        }

        .configuracoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        .config-item input {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 3px;
        }

        .margens-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        /* A Tela Virtual (Proporção 16:9) */
        .tela-virtual-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        #texto-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            /* Sombra padrão para leitura sobre imagens (Padrão Holyrics) */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), -1px -1px 2px rgba(0,0,0,0.8); 
            transition: all 0.2s;
            box-sizing: border-box;
        }

        /* --- BOTÕES --- */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        
        .btn-add {
            background-color: #27ae60;
            color: white;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-remove {
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-export {
            background-color: #2980b9;
            color: white;
            width: 100%;
            font-size: 18px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gerador de Slides Holyrics</h1>
        <p>Monte sua mensagem, visualize como ficará no telão e exporte o arquivo final.</p>
    </div>

    <div class="grid-container">
        
        <div class="editor-area">
            <button class="btn btn-add" onclick="adicionarSlide()">+ Adicionar Novo Slide</button>

            <div id="lista-slides">
                <div class="slide-container ativo" onclick="focarSlide(this)">
                    <div class="slide-header">
                        <span class="slide-numero">Slide 1</span>
                    </div>
                    <textarea placeholder="Digite o texto deste slide aqui..." oninput="atualizarPreview(this)" onfocus="focarSlide(this.parentNode)"></textarea>
                </div>
            </div>

            <button class="btn btn-export" onclick="exportarParaHolyrics()">📥 Baixar Arquivo para Holyrics</button>
        </div>

        <div class="preview-area">
            <div class="painel-preview">
                
                <div class="configuracoes">
                    <div class="config-item" style="grid-column: span 2;">
                        <label>Fundo de Tela (Imagem)</label>
                        <input type="file" id="input-fundo" accept="image/*" onchange="mudarFundo(event)">
                    </div>
                    
                    <div class="config-item">
                        <label>Tamanho da Fonte (px)</label>
                        <input type="number" id="input-tamanho" value="36" oninput="aplicarEstilosPreview()">
                    </div>

                    <div class="config-item">
                        <label>Cor da Fonte</label>
                        <input type="color" id="input-cor" value="#ffffff" oninput="aplicarEstilosPreview()">
                    </div>

                    <div class="config-item" style="grid-column: span 2;">
                        <label>Margens (%)</label>
                        <div class="margens-grid">
                            <input type="number" id="input-mt" placeholder="Topo" value="5" title="Margem Topo" oninput="aplicarEstilosPreview()">
                            <input type="number" id="input-mb" placeholder="Baixo" value="5" title="Margem Baixo" oninput="aplicarEstilosPreview()">
                            <input type="number" id="input-me" placeholder="Esq." value="10" title="Margem Esquerda" oninput="aplicarEstilosPreview()">
                            <input type="number" id="input-md" placeholder="Dir." value="10" title="Margem Direita" oninput="aplicarEstilosPreview()">
                        </div>
                    </div>
                </div>

                <div class="tela-virtual-container" id="tela-virtual">
                    <div id="texto-preview">A pré-visualização do texto aparecerá aqui...</div>
                </div>
                <p style="font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 10px;">*As configurações visuais acima não são exportadas, servem apenas para você simular o telão.</p>

            </div>
        </div>

    </div>

    <script>
        let contadorSlides = 1;
        let slideAtual = null;

        // Inicializa o preview com o estilo padrão ao carregar a página
        window.onload = function() {
            aplicarEstilosPreview();
            const primeiroTextarea = document.querySelector('textarea');
            if(primeiroTextarea) focarSlide(primeiroTextarea.parentNode);
        };

        function adicionarSlide() {
            contadorSlides++;
            const lista = document.getElementById('lista-slides');
            
            const novoSlide = document.createElement('div');
            novoSlide.className = 'slide-container';
            novoSlide.onclick = function() { focarSlide(this); };
            
            novoSlide.innerHTML = `
                <div class="slide-header">
                    <span class="slide-numero">Slide ${contadorSlides}</span>
                    <button class="btn btn-remove" onclick="removerSlide(this, event)">Remover</button>
                </div>
                <textarea placeholder="Digite o texto deste slide aqui..." oninput="atualizarPreview(this)" onfocus="focarSlide(this.parentNode)"></textarea>
            `;
            
            lista.appendChild(novoSlide);
            atualizarNumeracao();
            
            // Foca automaticamente no novo slide
            const novoTextarea = novoSlide.querySelector('textarea');
            novoTextarea.focus();
        }

        function removerSlide(botao, event) {
            event.stopPropagation(); // Evita que o clique acione o focarSlide()
            const slide = botao.closest('.slide-container');
            slide.remove();
            atualizarNumeracao();
            
            // Limpa o preview se excluir o slide atual
            document.getElementById('texto-preview').innerText = "";
        }

        function atualizarNumeracao() {
            const slides = document.querySelectorAll('.slide-container');
            slides.forEach((slide, index) => {
                const numeroSpan = slide.querySelector('.slide-header span');
                numeroSpan.textContent = `Slide ${index + 1}`;
            });
            contadorSlides = slides.length;
        }

        // --- LÓGICA DO PREVIEW ---

        function focarSlide(elementoSlide) {
            // Remove destaque dos outros
            document.querySelectorAll('.slide-container').forEach(el => el.classList.remove('ativo'));
            // Adiciona destaque no atual
            elementoSlide.classList.add('ativo');
            slideAtual = elementoSlide.querySelector('textarea');
            atualizarPreview(slideAtual);
        }

        function atualizarPreview(textarea) {
            const previewText = document.getElementById('texto-preview');
            previewText.innerText = textarea.value || "A pré-visualização do texto aparecerá aqui...";
        }

        function mudarFundo(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('tela-virtual').style.backgroundImage = `url(${url})`;
            }
        }

        function aplicarEstilosPreview() {
            const textoPreview = document.getElementById('texto-preview');
            
            // Pega os valores dos inputs
            const tamanho = document.getElementById('input-tamanho').value;
            const cor = document.getElementById('input-cor').value;
            const mt = document.getElementById('input-mt').value; // Margem Topo
            const mb = document.getElementById('input-mb').value; // Margem Baixo
            const me = document.getElementById('input-me').value; // Margem Esquerda
            const md = document.getElementById('input-md').value; // Margem Direita

            // Aplica no CSS do texto (usando padding para simular as margens da tela)
            textoPreview.style.fontSize = `${tamanho}px`;
            textoPreview.style.color = cor;
            textoPreview.style.padding = `${mt}% ${md}% ${mb}% ${me}%`;
        }

        // --- EXPORTAÇÃO ---

        function exportarParaHolyrics() {
            const caixasTexto = document.querySelectorAll('textarea');
            let textos = [];

            caixasTexto.forEach(caixa => {
                const conteudo = caixa.value.trim();
                if (conteudo !== '') {
                    textos.push(conteudo);
                }
            });

            if (textos.length === 0) {
                alert("Por favor, digite alguma mensagem antes de exportar.");
                return;
            }

            const textoFinal = textos.join('\n\n');
            const blob = new Blob([textoFinal], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Mensagem_Culto_Holyrics.txt';
            document.body.appendChild(link);
            link.click();
            
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
